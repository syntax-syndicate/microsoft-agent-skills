name: azure-keyvault-keys-rust-eval
description: Evaluation suite for azure-security-keyvault-keys-rust
version: "1.0"
type: capability
scoring:
  weights: {}
  threshold: 0.75
defaults:
  runs: 1
  timeout: 30m
  model: claude-sonnet-4.6
stimuli:
  - name: rust-keyvault-keys-operations
    prompt: |
      Write a Rust program named rust-keyvault-keys that demonstrates cryptographic key
      management and envelope encryption with Azure Key Vault:

      Key management operations:
      1. Create a KeyClient with vault URL and TokenCredential
      2. Create EC and RSA keys with CreateKeyParameters
      3. Get a key with get_key()
      4. Update key properties with UpdateKeyPropertiesParameters and tags
      5. Delete a key with delete_key()
      6. List keys with list_key_properties() and pagination

      Cryptographic operations:
      1. Wrap a data encryption key (DEK) with a key encryption key (KEK) using wrap_key()
      2. Use EncryptionAlgorithm::RsaOaep256 for wrapping
      3. Unwrap encrypted keys with unwrap_key() using the saved key version
      4. Demonstrate envelope encryption pattern

      Key types demonstrated:
      1. EC keys with CurveName::P256
      2. RSA keys with key_size: 2048 or 4096
      3. HSM-protected variants (EcHsm, RsaHsm)

      Advanced patterns:
      1. Extract resource ID components using ResourceExt trait
      2. Retain key versions for unwrap operations
      3. Handle KeyOperationParameters for wrap/unwrap operations
      4. Iterate keys with Pager<T> and TryStreamExt

      Demonstrate:
      - KeyClient::new() with vault URL and credential
      - CreateKeyParameters with KeyType and curve settings
      - UpdateKeyPropertiesParameters with tags
      - Wrap/unwrap pattern for envelope encryption
      - KeyOperationParameters with algorithm and value
      - ResourceExt for name/version extraction
      - Proper async/await with Tokio runtime
      - Result-based error propagation

      The program should compile and execute successfully, demonstrating complete
      key lifecycle management and envelope encryption workflows.

    rubric:
      - "Uses official azure_security_keyvault_keys SDK."
      - "Creates KeyClient with vault URL and TokenCredential."
      - "Creates EC keys with CurveName parameter."
      - "Creates RSA keys with key_size parameter."
      - "Gets keys with get_key() and converts with into_model()."
      - "Updates key properties with tags."
      - "Deletes keys with delete_key()."
      - "Lists keys with pagination using list_key_properties()."
      - "Wraps DEK with KEK using wrap_key() and EncryptionAlgorithm."
      - "Unwraps encrypted keys with unwrap_key() using key version."
      - "Preserves key versions for encryption/decryption pairs."
      - "Uses ResourceExt trait to extract name and version."
      - "Handles wrap/unwrap errors gracefully."
      - "Uses TokenCredential for secure authentication."
      - "Async/await with Tokio and proper error handling."
      - "Code compiles without warnings."
    workspace_files:
      include:
        - "**/Cargo.toml"
        - "**/Cargo.lock"
        - "**/src/**/*.rs"
      exclude:
        - "**/target/**"
        - "**/*.rlib"
        - "**/*.rmeta"
    environment:
      files:
        - src: workspace/cargo.toml
          dest: Cargo.toml
        - src: ../../_shared/vally/tools/check-azure-crates.rs
          dest: .vally/tools/check-azure-crates.rs
        - src: ../../_shared/vally/tools/check-token-credential.rs
          dest: .vally/tools/check-token-credential.rs
        - src: ../../_shared/vally/tools/check-async-runtime.rs
          dest: .vally/tools/check-async-runtime.rs
        - src: ../../_shared/vally/tools/check-no-secrets.rs
          dest: .vally/tools/check-no-secrets.rs
    constraints:
      expect_skills:
        - azure-keyvault-keys-rust
    graders:
      - type: prompt
        name: "Key Vault keys completeness"
        config:
          model: gpt-5.3-codex
          prompt: |
            - KeyClient creation with vault URL and credential
            - Create EC keys with CurveName::P256
            - Create RSA keys with key_size 2048 or 4096
            - Get key operation and into_model() conversion
            - Update key properties with tags
            - Delete key operation
            - List keys with Pager<T> pagination
            - Wrap operation with EncryptionAlgorithm::RsaOaep256
            - Unwrap operation preserving key versions
            - Envelope encryption pattern demonstration
            - ResourceExt for name/version extraction
            - TokenCredential authentication
            - Async/await throughout
          scoring: scale_1_5

      - name: Official Azure SDK Crate Selection
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-azure-crates.rs"
      - name: TokenCredential Authentication
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-token-credential.rs"
      - name: Async-First with Tokio Runtime
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-async-runtime.rs"
      - name: No Hardcoded Secrets
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-no-secrets.rs"

      - type: run-command
        name: "Cargo Check"
        config:
          command: cargo
          args:
            - "check"
          timeout: 90s
      - name: Rust Clippy Lints
        type: run-command
        weight: 1.0
        config:
          command: cargo
          args:
            - "clippy"
            - "--"
            - "-D"
            - "warnings"
          timeout: 120s
      - type: run-command
        name: "Cargo Build"
        config:
          command: cargo
          args:
            - "build"
          timeout: 120s

      - name: KeyClient Creation
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          KeyClient created via KeyClient::new(vault_url, credential, None)
          Vault URL formatted as https://vault_name.vault.azure.net/
          Credential is TokenCredential (DeveloperToolsCredential or ManagedIdentityCredential)
      - name: Key Creation Patterns
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          EC keys: CreateKeyParameters with kty: Some(KeyType::Ec), curve: Some(CurveName::P256)
          RSA keys: CreateKeyParameters with kty: Some(KeyType::Rsa), key_size: Some(2048)
          Keys created via client.create_key(name, body.try_into()?, None).await?
      - name: Key Management Operations
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Get: client.get_key(name, None).await?.into_model()?
          Update: client.update_key_properties(name, params.try_into()?, None).await?
          Delete: client.delete_key(name, None).await?
          List: client.list_key_properties(None)? returns Pager<T>
      - name: Envelope Encryption Pattern
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Wrap: client.wrap_key(key_name, params.try_into()?, None).await?
          Parameters include algorithm: Some(EncryptionAlgorithm::RsaOaep256) and value: Some(dek)
          Extract wrapped result and key version for later unwrap
          Unwrap: client.unwrap_key(key_name, version, params.try_into()?, None).await?
          Compare unwrapped value with original DEK
      - name: Key Version Management
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Extract key version from response via resource_id()?
          Version stored from wrap operation for later unwrap
          Same version used to unwrap (immutable relationship)
          Versions allow key rotation without losing decryption capability
      - name: Pagination and Resource Extraction
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          List returns Pager<T>, iterate with let mut pager = ...; while let Some(key) = pager.try_next().await?
          ResourceExt provides key.resource_id()? with name and version
          Use TryStreamExt trait from futures crate
      - name: Async Runtime and Error Handling
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Uses #[tokio::main] on main function
          All I/O awaited (client operations, wrapping, unwrapping)
          No .unwrap() on Result types
          Proper error propagation with ? operator
