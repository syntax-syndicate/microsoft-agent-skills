name: azure-identity-rust-eval
description: Evaluation suite for azure-identity-rust
version: "1.0"
type: capability
scoring:
  weights: {}
  threshold: 0.75
defaults:
  runs: 1
  timeout: 30m
  model: claude-sonnet-4.6
stimuli:
  - name: rust-identity-credentials
    prompt: |
      Write a Rust program named rust-identity-demo that demonstrates all major credential
      types from the Azure Identity SDK:

      Development credentials:
      1. Create a DeveloperToolsCredential with DeveloperToolsCredential::new(None)?
      2. Use it to authenticate (attempts Azure CLI, then Azure Developer CLI)
      3. Clone and pass to multiple Azure SDK clients

      Production credentials:
      1. Create a ManagedIdentityCredential with ManagedIdentityCredential::new(None)?
      2. Demonstrate system-assigned managed identity
      3. Show how to use with Azure-hosted resources (VMs, App Service, Functions, AKS)

      Service principal credentials:
      1. Create a ClientSecretCredential with tenant_id, client_id, and client_secret
      2. Demonstrate configuration from environment variables
      3. Show error handling for missing credentials

      Credential capabilities:
      1. Pass credentials to SecretClient or KeyClient constructors
      2. Clone credentials for use with multiple clients
      3. Handle credential errors (authentication failures, missing env vars)

      Demonstrate:
      - DeveloperToolsCredential for local development
      - ManagedIdentityCredential for Azure-hosted workloads
      - ClientSecretCredential for CI/CD and service accounts
      - Credential cloning for multi-client scenarios
      - TokenCredential trait abstraction
      - Environment variable usage (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_CLIENT_SECRET)
      - Error handling with Result-based patterns
      - Proper async/await with Tokio runtime
      - No hardcoded secrets

      The program should compile and execute successfully, demonstrating the full
      credential landscape and how to choose credentials for different deployment scenarios.

    rubric:
      - "Uses official azure_identity SDK for all credential types."
      - "Demonstrates DeveloperToolsCredential for local development."
      - "Demonstrates ManagedIdentityCredential for Azure-hosted resources."
      - "Demonstrates ClientSecretCredential with tenant, client, and secret."
      - "Credentials properly cloned when passing to multiple clients."
      - "Environment variables used for sensitive configuration (never hardcoded)."
      - "Credentials passed as Some(credential) to SDK clients."
      - "TokenCredential trait used for credential abstraction."
      - "Error handling for credential creation and missing env vars."
      - "Documentation or comments explain when each credential type is appropriate."
      - "Async/await with Tokio runtime."
      - "Code compiles without warnings."
      - "Result-based error propagation with ? operator."
    workspace_files:
      include:
        - "**/Cargo.toml"
        - "**/Cargo.lock"
        - "**/src/**/*.rs"
      exclude:
        - "**/target/**"
        - "**/*.rlib"
        - "**/*.rmeta"
    environment:
      skills:
        - ../../../../.github/plugins/azure-sdk-rust/skills/azure-identity-rust
      files:
        - src: workspace/cargo.toml
          dest: Cargo.toml
    constraints:
      expect_skills:
        - azure-identity-rust
    graders:
      - type: prompt
        name: "Identity credential completeness"
        config:
          model: gpt-5.3-codex
          prompt: |
            - DeveloperToolsCredential creation and usage
            - ManagedIdentityCredential creation and usage
            - ClientSecretCredential with tenant_id, client_id, client_secret
            - Credential cloning for multiple clients
            - TokenCredential trait for abstraction
            - Environment variable usage (AZURE_CLIENT_ID, AZURE_TENANT_ID, AZURE_CLIENT_SECRET)
            - Error handling for credential creation
            - Documentation on credential selection per scenario
            - Async/await with Tokio runtime
            - No hardcoded secrets in source
          scoring: scale_1_5

      - type: run-command
        name: "Cargo Check"
        config:
          command: cargo
          args:
            - "check"
          timeout: 90s
      - name: Rust Clippy Lints
        type: run-command
        weight: 1.0
        config:
          command: cargo
          args:
            - "clippy"
            - "--"
            - "-D"
            - "warnings"
          timeout: 120s
      - type: run-command
        name: "Cargo Build"
        config:
          command: cargo
          args:
            - "build"
          timeout: 120s

      - name: Official Azure SDK Crate Selection
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-azure-crates.rs"
      - name: TokenCredential Authentication
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-token-credential.rs"
      - name: Async-First with Tokio Runtime
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-async-runtime.rs"
      - name: No Hardcoded Secrets
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-no-secrets.rs"
      - name: DeveloperToolsCredential
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          DeveloperToolsCredential created via DeveloperToolsCredential::new(None)?
          Attempts Azure CLI (az login) first, then Azure Developer CLI (azd auth login)
          Perfect for local development; never used in production
      - name: ManagedIdentityCredential
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          ManagedIdentityCredential created via ManagedIdentityCredential::new(None)?
          System-assigned managed identity for Azure-hosted workloads
          Used in VMs, App Service, Functions, AKS, Container Instances
          No environment variables needed; identity managed by Azure
      - name: ClientSecretCredential
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          ClientSecretCredential created with three parameters:
          tenant_id (string), client_id (string), client_secret (string)
          Typically sourced from environment variables to avoid hardcoding
          Used for CI/CD pipelines and service principal authentication
      - name: Credential Cloning
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Credentials are Arc-wrapped and support cloning
          Pass credential.clone() to multiple client constructors
          Single credential instance can authenticate multiple SDK clients
          Reduces overhead and maintains consistent auth context
      - name: TokenCredential Trait
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          All credential types implement TokenCredential trait
          Allows generic code that accepts any credential type
          SDK clients accept Some(credential) where credential: impl TokenCredential
      - name: Environment Variable Configuration
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          AZURE_TENANT_ID: Tenant ID for service principal auth
          AZURE_CLIENT_ID: Client/application ID
          AZURE_CLIENT_SECRET: Client secret (never commit to source control)
          std::env::var() used to read environment variables
      - name: Error Handling
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Credential creation returns Result<T, E>
          Missing or invalid credentials generate errors
          Environment variable errors handled with match or ?
          No unwrap() on credential creation
      - name: Scenario Documentation
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Code includes comments explaining when each credential is appropriate
          DeveloperToolsCredential for local development
          ManagedIdentityCredential for production on Azure
          ClientSecretCredential for CI/CD and service accounts
