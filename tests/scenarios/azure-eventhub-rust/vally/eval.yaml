name: azure-eventhub-rust-eval
description: Evaluation suite for azure-eventhub-rust
version: "1.0"
type: capability
scoring:
  weights: {}
  threshold: 1.0
defaults:
  runs: 1
  timeout: 30m
  model: claude-sonnet-4.6
stimuli:
  - name: rust-eventhub-producer-consumer
    prompt: |
      Write a Rust program named rust-eventhub-demo that demonstrates producer and consumer patterns
      for Azure Event Hubs:

      Producer operations:
      1. Create a ProducerClient with namespace credentials
      2. Send single events to the hub
      3. Create a batch and add multiple events to it
      4. Send the batch
      5. Handle backpressure and errors during sending

      Consumer operations:
      1. Create a ConsumerClient with the same credentials
      2. Open a receiver on partition "0"
      3. Set the start position to StartLocation::Earliest
      4. Stream events from the receiver
      5. Extract and display event body data
      6. Handle errors per event in the stream

      Program should demonstrate:
      - DeveloperToolsCredential or ManagedIdentityCredential usage
      - ProducerClient::builder() pattern for producer initialization
      - ConsumerClient::builder() pattern for consumer initialization
      - Single event sending via producer.send_event(vec![...], None).await
      - Batch creation and event addition via create_batch() and try_add_event_data()
      - Receiver creation on specific partition with start position configuration
      - Stream processing with futures::stream::StreamExt and while let Some(...) pattern
      - Proper async/await and error handling with Result types

      The program should compile and execute successfully, demonstrating the complete
      event hub producer-consumer workflow with proper credential-based authentication.

    rubric:
      - "Implements both ProducerClient and ConsumerClient from official azure_messaging_eventhubs SDK."
      - "Uses TokenCredential-based authentication (DeveloperToolsCredential or ManagedIdentityCredential)."
      - "ProducerClient sends single events and batch events to Event Hub."
      - "ConsumerClient receives events from specific partition with configurable start position."
      - "Demonstrates async/await Rust with Tokio runtime."
      - "Event stream processing with proper error handling per event."
      - "Code compiles with cargo check without warnings."
      - "Builder pattern used for both client initialization."
      - "StartLocation configuration for consumer start position (Earliest/Latest)."
      - "Proper extraction of event body data from stream."
    workspace_files:
      include:
        - "**/Cargo.toml"
        - "**/Cargo.lock"
        - "**/src/**/*.rs"
        - "**/examples/**/*.rs"
      exclude:
        - "**/target/**"
        - "**/*.rlib"
        - "**/*.rmeta"
        - "**/*.d"
    environment:
      skills:
        - ../../../../.github/plugins/azure-sdk-rust/skills/azure-eventhub-rust
      files:
        - src: workspace/cargo.toml
          dest: Cargo.toml
    constraints:
      expect_skills:
        - azure-eventhub-rust
    graders:
      - type: prompt
        name: "EventHub producer-consumer completeness"
        config:
          model: gpt-5.3-codex
          prompt: |
            - ProducerClient creation with builder pattern
            - Single event sending: producer.send_event(vec![...], None).await
            - Batch operations: create_batch() and try_add_event_data()
            - ConsumerClient creation with builder pattern
            - Receiver creation: open_receiver_on_partition()
            - StartPosition configuration with StartLocation::Earliest
            - Event stream processing with futures::stream::StreamExt
            - Error handling for individual events in stream
            - TokenCredential authentication
            - Async/await patterns throughout
          scoring: scale_1_5

      - type: run-command
        name: "Cargo Check"
        config:
          command: cargo
          args:
            - "check"
          timeout: 90s
      - type: run-command
        name: "Cargo Build"
        config:
          command: cargo
          args:
            - "build"
          timeout: 120s
          stderr_contains: "Finished"

      - name: ProducerClient Pattern
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          ProducerClient created via ProducerClient::builder()
          .open(namespace, eventhub_name, credential).await?
          Sends single events via send_event(data, None).await
          Creates batches via create_batch(None).await and adds events via try_add_event_data()
      - name: ConsumerClient Pattern
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          ConsumerClient created via ConsumerClient::builder()
          .open(namespace, eventhub_name, credential).await?
          Opens receiver on partition via open_receiver_on_partition() with partition ID as string
          Sets StartPosition with StartLocation::Earliest or Latest
      - name: Event Stream Processing
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Event stream obtained via receiver.stream_events()
          Stream processing with while let Some(event_result) = stream.next().await
          Match on Ok/Err for per-event error handling
          Uses futures::stream::StreamExt trait for stream operations
      - name: Async Runtime
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Code uses #[tokio::main] attribute and async/await throughout
          All I/O operations are properly awaited
          Result<T, Box<dyn std::error::Error>> main signature
      - name: Credential Management
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Uses DeveloperToolsCredential for local dev or ManagedIdentityCredential for production
          Credential is cloned when passed to multiple clients
          No hardcoded credentials in source code
