name: azure-keyvault-certificates-rust-eval
description: Evaluation suite for azure-security-keyvault-certificates-rust
version: "1.0"
type: capability
scoring:
  weights: {}
  threshold: 1.0
defaults:
  runs: 1
  timeout: 30m
  model: claude-sonnet-4.6
stimuli:
  - name: rust-keyvault-certificates-operations
    prompt: |
      Write a Rust program named rust-keyvault-certs that demonstrates X.509 certificate
      management and long-running operations with Azure Key Vault:

      Setup:
      1. Create a CertificateClient with vault URL and TokenCredential
      2. Use DeveloperToolsCredential for local dev

      Certificate creation (Long-Running Operation):
      1. Define CertificatePolicy with X509CertificateProperties
      2. Set subject to "CN=example.com"
      3. Set IssuerParameters with name "Self" for self-signed
      4. Create certificate with begin_create_certificate() returning Poller<T>
      5. Await the Poller<T> for completion
      6. Extract certificate name and version via ResourceExt

      Certificate management:
      1. Get an existing certificate with get_certificate()
      2. Update certificate properties with UpdateCertificatePropertiesParameters
      3. Add tags to certificates
      4. Delete a certificate with delete_certificate()
      5. List certificates with list_certificate_properties() returning Pager<T>

      Advanced operations:
      1. Use certificate key for signing via KeyClient integration
      2. Create SignParameters with digest and SignatureAlgorithm
      3. Demonstrate that certificates contain embedded keys

      Demonstrate:
      - CertificateClient::new() with vault URL and credential
      - CertificatePolicy with X509CertificateProperties and IssuerParameters
      - CreateCertificateParameters with policy
      - Poller<T> from begin_create_certificate() as IntoFuture
      - Direct .await on Poller for completion
      - GetCertificate and UpdateCertificatePropertiesParameters
      - Pager<T> iteration with TryStreamExt::try_next()
      - ResourceExt for name and version extraction
      - Proper async/await with Tokio runtime
      - Result-based error propagation

      The program should compile and execute successfully, demonstrating complete
      certificate lifecycle including LRO handling and signing operations.

    rubric:
      - "Uses official azure_security_keyvault_certificates SDK."
      - "Creates CertificateClient with vault URL and TokenCredential."
      - "Defines CertificatePolicy with X509CertificateProperties and subject."
      - "Sets IssuerParameters with 'Self' for self-signed certificates."
      - "Creates certificates with begin_create_certificate() returning Poller."
      - "Awaits Poller<T> directly for LRO completion."
      - "Gets certificates with get_certificate() and converts with into_model()."
      - "Updates certificate properties with tags."
      - "Deletes certificates with delete_certificate()."
      - "Lists certificates with pagination using list_certificate_properties()."
      - "Uses ResourceExt trait to extract name and version."
      - "Demonstrates certificate key access for signing operations."
      - "Handles LRO errors gracefully."
      - "Uses TokenCredential for secure authentication."
      - "Async/await with Tokio and proper error handling."
      - "Code compiles without warnings."
    workspace_files:
      include:
        - "**/Cargo.toml"
        - "**/Cargo.lock"
        - "**/src/**/*.rs"
      exclude:
        - "**/target/**"
        - "**/*.rlib"
        - "**/*.rmeta"
    environment:
      files:
        - src: workspace/cargo.toml
          dest: Cargo.toml
    constraints:
      expect_skills:
        - azure-keyvault-certificates-rust
    graders:
      - type: prompt
        name: "Key Vault certificates completeness"
        config:
          model: gpt-5.3-codex
          prompt: |
            - CertificateClient creation with vault URL and credential
            - CertificatePolicy with X509CertificateProperties
            - Subject set to CN=example.com format
            - IssuerParameters with "Self" for self-signed
            - CreateCertificateParameters wrapping policy
            - begin_create_certificate() returning Poller<T>
            - Direct .await on Poller (IntoFuture pattern)
            - Get certificate and into_model() conversion
            - Update certificate properties with tags
            - Delete certificate operation
            - List certificates with Pager<T> pagination
            - ResourceExt for name/version extraction
            - TokenCredential authentication
            - Async/await throughout
          scoring: scale_1_5

      - type: run-command
        name: "Cargo Check"
        config:
          command: cargo
          args:
            - "check"
          timeout: 90s
      - name: Rust Clippy Lints
        type: run-command
        weight: 1.0
        config:
          command: cargo
          args:
            - "clippy"
            - "--"
            - "-D"
            - "warnings"
          timeout: 120s
      - type: run-command
        name: "Cargo Build"
        config:
          command: cargo
          args:
            - "build"
          timeout: 120s

      - name: CertificateClient Creation
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          CertificateClient created via CertificateClient::new(vault_url, credential, None)
          Vault URL formatted as https://vault_name.vault.azure.net/
          Credential is TokenCredential (DeveloperToolsCredential or ManagedIdentityCredential)
      - name: Certificate Policy Definition
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          CertificatePolicy includes x509_certificate_properties and issuer_parameters
          X509CertificateProperties has subject: Some("CN=example.com".into())
          IssuerParameters has name: Some("Self".into()) for self-signed certificates
      - name: Long-Running Operation Pattern
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          begin_create_certificate() returns Poller<T>
          Poller implements IntoFuture trait
          Direct await on Poller: client.begin_create_certificate(...)?.await?
          Awaiting completes the LRO and returns the certificate
      - name: Certificate Management Operations
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Get: client.get_certificate(name, None).await?.into_model()?
          Update: client.update_certificate_properties(name, params.try_into()?, None).await?
          Delete: client.delete_certificate(name, None).await?
          List: client.list_certificate_properties(None)? returns Pager<T>
      - name: Certificate Properties Update
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          UpdateCertificatePropertiesParameters with tags: Some(HashMap)
          Tags stored as Vec of key-value pairs
          Uses #[allow(clippy::needless_update)] with ..Default::default()
          Properties persist across certificate versions
      - name: Pagination and Resource Extraction
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          List returns Pager<T>, iterate with let mut pager = ...; while let Some(cert) = pager.try_next().await?
          ResourceExt provides cert.resource_id()? with name and version
          Uses TryStreamExt trait from futures crate
      - name: Certificate Key Integration
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Certificates contain embedded keys for signing operations
          KeyClient can sign with certificate name as key reference
          Demonstrates that certificates are more than just X.509 data
      - name: Async Runtime and Error Handling
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Uses #[tokio::main] on main function
          All I/O awaited including LRO completion
          No .unwrap() on Result types
          Proper error propagation with ? operator
