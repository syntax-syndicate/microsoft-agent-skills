name: azure-storage-blob-rust-skill-experiment
evals:
  - eval-experiment.yaml
  - eval-nobuild-experiment.yaml

vary:
  - /defaults/model
  - /environment/skills

baseline: sonnet_baseline

variants:
  sonnet_skill:
    overrides:
      model: claude-sonnet-4.6
    environment:
      skills:
        - ../../../../.github/plugins/azure-sdk-rust/skills/azure-storage-blob-rust
  sonnet_baseline:
    overrides:
      model: claude-sonnet-4.6
    environment:
      skills: []
