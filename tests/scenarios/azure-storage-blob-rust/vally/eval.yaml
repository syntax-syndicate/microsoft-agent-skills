name: azure-storage-blob-rust-eval
description: Evaluation suite for azure-storage-blob-rust
version: "1.0"
type: capability
scoring:
  weights: {}
  threshold: 1.0
defaults:
  runs: 1
  timeout: 30m
  model: claude-sonnet-4.6
stimuli:
  - name: rust-crud-blobs
    prompt: |
      Write a Rust program named rust-blob that performs the following blob storage operations:
      1. Create a blob container called "my-container" if it does not already exist
      2. Upload a local file "example.txt" as a block blob named "uploads/example.txt"
      3. List all blobs in the container and print their names and sizes
      4. Download the blob back to a local file "downloaded-example.txt"
      5. Delete the blob and then delete the container

      Include proper error handling for cases like container already existing
      or blob not found.

      Before the task is considered complete, ensure that the generated code compiles and
      runs successfully, demonstrating the CRUD operations on Azure Blob Storage using the 
      Rust SDK.

      In order to verify correct functionality, you may need to create an Azure Blob Storage 
      instance and you will have to configure authentication. Make sure to have the necessary 
      permissions to perform blob operations in the storage account you are using for testing.
    rubric:
      - "Implements the full blob CRUD workflow end-to-end: create container, upload, list, download, and delete blob/container."
      - "Uses official Azure Rust SDK crate patterns and a TokenCredential-based authentication flow."
      - "Uses async Rust with Tokio runtime and idiomatic Result-based error propagation."
      - "Code compiles and passes cargo check for the rust-blob project."
      - "Uses correct Azure client construction, response handling, and pager usage where applicable."
      - "Avoids hardcoded secrets in source code or configuration committed to the workspace."
      - "rustfmt compliance is bonus quality signal only and should not block a successful evaluation when all substantive correctness and SDK-usage criteria pass."
    workspace_files:
      include:
        - "**/Cargo.toml"
        - "**/Cargo.lock"
        - "**/build.rs"
        - "**/src/**/*.rs"
        - "**/examples/**/*.rs"
        - "**/tests/**/*.rs"
      exclude:
        - "**/target/**"
        - "**/*.rlib"
        - "**/*.rmeta"
        - "**/*.d"
        - "**/*.o"
        - "**/*.obj"
        - "**/*.pdb"
        - "**/*.exe"
        - "**/*.dll"
        - "**/*.so"
        - "**/*.dylib"
        - "**/*.a"
        - "**/*.lib"
        - "**/*.wasm"
    environment:
      skills:
        - ../../../../.github/plugins/azure-sdk-rust/skills/azure-storage-blob-rust
      files:
        - src: ../../_shared/vally/tools/find-cargo-root.js
          dest: .vally/tools/find-cargo-root.js
        - src: ../../_shared/vally/tools/check-azure-crates.rs
          dest: .vally/tools/check-azure-crates.rs
        - src: ../../_shared/vally/tools/check-token-credential.rs
          dest: .vally/tools/check-token-credential.rs
        - src: ../../_shared/vally/tools/check-async-runtime.rs
          dest: .vally/tools/check-async-runtime.rs
        - src: ../../_shared/vally/tools/check-no-secrets.rs
          dest: .vally/tools/check-no-secrets.rs
        - src: workspace/cargo.toml
          dest: Cargo.toml
    constraints:
      expect_skills:
        - azure-storage-blob-rust
    graders:
      - type: prompt
        name: "Prompt correctness and completeness of blob storage operations"
        config:
          model: gpt-5.3-codex
          prompt: |
            - The code should demonstrate an azure blob storage client with a storage account url and credential
            - Creating a container for container creation
            - Uploading from a file path
            - Enumerate blobs in a container
            - Download from a blob to a local file
            - Deleting blob files and containers for cleanup
            - Error handling
          scoring: scale_1_5

      # - type: run-command
      #   name: "Build Application"
      #   config:
      #     command: cargo
      #     args:
      #       - "build"
      #     timeout: 120s
      #     stderr_contains: "Finished"
      # - type: run-command
      #   name: "Check Application"
      #   config:
      #     command: cargo
      #     args:
      #       - "check"
      #     timeout: 90s
      # - name: Rust Clippy Lints
      #   type: run-command
      #   weight: 0.5
      #   config:
      #     command: cargo
      #     args:
      #       - "clippy"
      #       - "--"
      #       - "-D"
      #       - "warnings"
      #     timeout: 120s
      - name: Official Azure SDK Crate Selection
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-azure-crates.rs"
      - name: TokenCredential Authentication
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-token-credential.rs"
      - name: Async-First with Tokio Runtime
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-async-runtime.rs"
      - name: Idiomatic Error Handling
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Error handling uses Result<T, E> and the ? operator. Calls to
          .unwrap() are avoided or used only where failure
          is impossible. Calls to expect() with a reasonable error message are allowed 
          only if termination of the application is acceptable. Azure service errors are 
          matched via azure_core::Error with ErrorKind (e.g.,
          ErrorKind::HttpResponse { status, error_code, .. } with
          StatusCode comparison). The main function returns
          Result<(), Box<dyn std::error::Error>> or azure_core::Result<()>.
      - name: Correct Client Construction
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Service clients are constructed using the ::new() constructor
          with an endpoint string, credential, and Option<ClientOptions> parameter.
          If a ClientOptions parameter is specified, structs use ..Default::default()
          for forward compatibility. If all the fields in the ClientOptions struct are provided, the
          #[allow(clippy::needless_update)] annotation is used.
      - name: Pager and Stream Usage
        type: prompt
        model: gpt-5.3-codex
        weight: 1.0
        prompt: >
          List operations return and consume azure_core::Pager<T> using
          futures::TryStreamExt (try_next/try_collect). Pagination is
          handled correctly by iterating all items. In most if not all
          cases, individual items should be iterated over directly rather
          than page-by-page, demonstrating the SDK's ability to handle 
          pagination internally. Page-by-page iteration via into_pages()
          is only necessary when there is an explicit requirement for page-level
          access.
      - name: Response Handling
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Calls to service clients correctly handle Response<T>. When service
          methods return a model type, code calls into_model() to deserialize
          the response body into the expected model type (not manually parsing
          JSON). When raw HTTP details are needed, deconstruct() is used to 
          access status, headers, and body separately.
      - name: Long-Running Operations
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Long-running operations use azure_core::Poller<T> correctly.
          If a client calls into an API returning a Poller, code awaits
          the Poller directly (via IntoFuture) for the final result.
          The only time that a client should iterate over status updates via
          futures::TryStreamExt is when there is an explicit requirement for
          status-level access.
      - name: Struct Initialization with Default
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          If a client initializes a structure for SDK types (client options, method
          options, model types) the code uses ..Default::default() to protect
          against future field additions.
      - name: Ownership and Borrowing
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Code uses references (&str, &T) for borrowed data and avoids
          unnecessary .clone() calls. Credentials are shared via Arc or
          clone(). No unnecessary Box or Rc where Arc is appropriate.
          Parameters that are only used for URL construction borrow
          rather than own the data.
      - name: No Hardcoded Secrets
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-no-secrets.rs"
      - name: Rust Cargo Trajectory Build Failure
        type: rust-cargo-build-failure-check
        weight: 1.0
        config:
          collect_trajectory_compiler_errors: true
          emit_in_metadata: true
          error_exceptions:
            - error_code: E0277
              message_pattern: "Option<std::string::String>"
              action: ignore_for_fail
      - name: Post prompt Rust Cargo Build Failure
        type: rust-cargo-build-failure-check
        weight: 1.0
        config:
          commands:
            - command: cargo build
          emit_in_metadata: true
          error_exceptions:
            - error_code: E0277
              message_pattern: "Option<std::string::String>"
              action: ignore_for_fail
      - name: Post prompt Rust Cargo Check Failure
        type: rust-cargo-build-failure-check
        weight: 1.0
        config:
          commands:
            - command: cargo check
          emit_in_metadata: true
          error_exceptions:
            - error_code: E0277
              message_pattern: "Option<std::string::String>"
              action: ignore_for_fail
      - name: Post prompt Rust Cargo Clippy Failure
        type: rust-cargo-build-failure-check
        weight: 1.0
        config:
          commands:
            - command: cargo clippy
          emit_in_metadata: true
          error_exceptions:
            - error_code: E0277
              message_pattern: "Option<std::string::String>"
              action: ignore_for_fail
