name: azure-cosmos-rust-eval
description: Evaluation suite for azure-data-cosmos-rust
version: "1.0"
type: capability
scoring:
  weights: {}
  threshold: 1.0
defaults:
  runs: 1
  timeout: 30m
  model: claude-sonnet-4.6
stimuli:
  - name: rust-cosmos-crud-operations
    prompt: |
      Write a Rust program named rust-cosmos-ops that demonstrates complete CRUD operations
      and NoSQL document patterns with Azure Cosmos DB:

      Setup operations:
      1. Create a CosmosClient using builder pattern with ProximityTo routing strategy
      2. Get a database client for "myDatabase"
      3. Get a container client for "myContainer"

      CRUD operations:
      1. Create an item with partition key and document fields using create_item()
      2. Read an item by partition key and ID using read_item()
      3. Update an item by replacing it with replace_item()
      4. Delete an item using delete_item()
      5. Handle partition key requirements in all operations

      Advanced operations:
      1. Patch an item using patch_item() with PatchInstructions
      2. Use PatchOperation::set() to update specific fields
      3. Extract model from responses using into_model()

      Data structures:
      1. Define a struct Item with id, partition_key, and value fields
      2. Use serde::Serialize and serde::Deserialize traits
      3. Demonstrate serde_json for JSON operations

      Demonstrate:
      - CosmosClient::builder().build(account, routing_strategy).await pattern
      - Container hierarchy: client -> database -> container
      - Partition key as required parameter in all item operations
      - Result-based error handling with ErrorResponse extraction
      - TokenCredential authentication (DeveloperToolsCredential/ManagedIdentityCredential)
      - Async/await with Tokio runtime
      - into_model() for response conversion

      The program should compile and execute successfully, demonstrating the complete
      Cosmos DB NoSQL document lifecycle with proper partition key management.

    rubric:
      - "Uses official azure_data_cosmos SDK for NoSQL operations."
      - "Creates CosmosClient with builder pattern and ProximityTo routing strategy."
      - "Navigates client hierarchy: client -> database_client() -> container_client()."
      - "Create items with partition key and ID using create_item()."
      - "Read items by partition key and ID using read_item()."
      - "Update items with replace_item() for full updates."
      - "Delete items using delete_item() with partition key."
      - "Patch items with PatchInstructions and PatchOperation for partial updates."
      - "Extracts partition key and ID from ResourceExt trait methods."
      - "Uses TokenCredential for secure authentication."
      - "Async/await with Tokio and proper Result-based error propagation."
      - "Code compiles without warnings."
    workspace_files:
      include:
        - "**/Cargo.toml"
        - "**/Cargo.lock"
        - "**/src/**/*.rs"
      exclude:
        - "**/target/**"
        - "**/*.rlib"
        - "**/*.rmeta"
    environment:
      files:
        - src: workspace/cargo.toml
          dest: Cargo.toml
    constraints:
      expect_skills:
        - azure-cosmos-rust
    graders:
      - type: prompt
        name: "Cosmos DB CRUD completeness"
        config:
          model: gpt-5.3-codex
          prompt: |
            - CosmosClient creation with builder and ProximityTo routing
            - Database and container client navigation
            - Create item with partition key and ID
            - Read item by partition key
            - Replace item for full updates
            - Delete item by partition key
            - Patch item with PatchInstructions
            - PatchOperation::set() for field updates
            - Response conversion with into_model()
            - Error handling with ErrorResponse
            - TokenCredential authentication
            - Async/await with Tokio
          scoring: scale_1_5

      - type: run-command
        name: "Cargo Check"
        config:
          command: cargo
          args:
            - "check"
          timeout: 90s
      - name: Rust Clippy Lints
        type: run-command
        weight: 1.0
        config:
          command: cargo
          args:
            - "clippy"
            - "--"
            - "-D"
            - "warnings"
          timeout: 120s
      - type: run-command
        name: "Cargo Build"
        config:
          command: cargo
          args:
            - "build"
          timeout: 120s

      - name: CosmosClient Builder Pattern
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          CosmosClient created via CosmosClient::builder()
          .build(account, RoutingStrategy::ProximityTo(region)).await?
          Database accessed via client.database_client(name)
          Container accessed via database.container_client(name).await
      - name: CRUD Operations
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Create: container.create_item(partition_key, id, item, None).await?
          Read: container.read_item(partition_key, id, None).await?
          Update: container.replace_item(partition_key, id, item, None).await?
          Delete: container.delete_item(partition_key, id, None).await?
          All require partition_key as first parameter
      - name: Partition Key Management
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Partition key is required parameter in all item operations
          Partition key value passed as string to operations
          Document fields include partition_key field for consistency
          Responses contain partition key information
      - name: Patch Operations
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Patch operations use PatchInstructions::from(vec![...])
          Operations created with PatchOperation::set(path, value)
          Patched items obtained via container.patch_item(...).await?
          Patch returns response with into_model() conversion
      - name: Response Conversion and Error Handling
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Responses converted with into_model() for deserialization
          Error handling with match and error extraction
          No .unwrap() on fallible operations
          Result<T, E> propagated through main with ? operator
      - name: Async Runtime
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Uses #[tokio::main] on main function
          All I/O operations awaited
          Serde for serialization/deserialization
          TokenCredential passed with Some(credential)
