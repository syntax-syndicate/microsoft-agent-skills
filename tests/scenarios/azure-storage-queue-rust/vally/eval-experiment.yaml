name: azure-storage-queue-rust-eval
description: Evaluation suite for azure-storage-queue-rust
version: "1.0"
type: capability
scoring:
  weights: {}
  threshold: 1.0
defaults:
  runs: 1
  timeout: 30m
  model: claude-sonnet-4.6
stimuli:
  - name: rust-queue-operations
    prompt: |
      Write a Rust program named rust-queue-ops that performs the following queue storage operations:
      1. Create a QueueServiceClient from an endpoint URL with TokenCredential authentication
      2. Create or get a queue client for a queue named "work-queue"
      3. Send 3 messages to the queue with different message text
      4. Receive messages from the queue (up to 5 messages)
      5. Peek at messages in the queue without removing them
      6. For each received message, extract the message ID, pop receipt, and message text
      7. Delete messages from the queue using message ID and pop receipt
      8. Demonstrate proper error handling for queue operations

      The program should compile and run successfully with the official Azure Storage Queue SDK,
      demonstrating full CRUD operations on queue messages with proper TokenCredential-based authentication.

      Ensure the following SDK patterns are demonstrated:
      - QueueServiceClient initialization with endpoint and credential
      - QueueClient derivation from QueueServiceClient
      - Message send/receive/peek/delete workflows
      - Proper use of try_into() for message models
      - Error handling with Result-based patterns
    rubric:
      - "Implements complete queue message lifecycle: send, receive, peek, and delete operations end-to-end."
      - "Uses official azure_storage_queue SDK with TokenCredential-based authentication."
      - "Uses async Rust with Tokio runtime and idiomatic Result-based error propagation."
      - "Code compiles and passes cargo check."
      - "Correctly derives QueueClient from QueueServiceClient and uses queue_client() method."
      - "Message receive operations properly extract message_id, pop_receipt, and message_text fields."
      - "Message delete operations use both message_id and pop_receipt from received messages."
      - "Peek operations demonstrate reading messages without consuming them from the queue."
      - "Avoids hardcoded credentials in source code."
    workspace_files:
      include:
        - "**/Cargo.toml"
        - "**/Cargo.lock"
        - "**/build.rs"
        - "**/src/**/*.rs"
        - "**/examples/**/*.rs"
        - "**/tests/**/*.rs"
      exclude:
        - "**/target/**"
        - "**/*.rlib"
        - "**/*.rmeta"
        - "**/*.d"
        - "**/*.o"
        - "**/*.obj"
        - "**/*.pdb"
        - "**/*.exe"
        - "**/*.dll"
        - "**/*.so"
        - "**/*.dylib"
        - "**/*.a"
        - "**/*.lib"
        - "**/*.wasm"
    environment:
      files:
        - src: workspace/cargo.toml
          dest: Cargo.toml
    constraints:
      expect_skills:
        - azure-storage-queue-rust
    graders:
      - type: prompt
        name: "Queue operations completeness"
        config:
          model: gpt-5.3-codex
          prompt: |
            - QueueServiceClient initialization with endpoint URL and credential
            - QueueClient derived from service client
            - Send message operations with message_text
            - Receive messages with proper message_id, pop_receipt extraction
            - Peek messages without removal
            - Delete messages using message_id and pop_receipt pair
            - Error handling for queue operations
          scoring: scale_1_5

      - type: run-command
        name: "Build Application"
        config:
          command: cargo
          args:
            - "build"
          timeout: 120s
          stderr_contains: "Finished"
      - type: run-command
        name: "Check Application"
        config:
          command: cargo
          args:
            - "check"
          timeout: 90s
      - name: Rust Clippy Lints
        type: run-command
        weight: 1.0
        config:
          command: cargo
          args:
            - "clippy"
            - "--"
            - "-D"
            - "warnings"
          timeout: 120s
      - name: Official Azure SDK Crate Selection
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-azure-crates.rs"
      - name: TokenCredential Authentication
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Authentication uses TokenCredential from azure_identity, created via
          DeveloperToolsCredential::new(None) or ManagedIdentityCredential::new(None).
          The credential is passed to QueueServiceClient::new() as Some(credential).
          For production, uses ManagedIdentityCredential; for local dev, uses DeveloperToolsCredential.
      - name: QueueServiceClient Construction
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          QueueServiceClient is created via QueueServiceClient::new() with three parameters:
          service_url (Url type), Some(credential), and None for options.
          QueueClient is derived via service_client.queue_client("<queue_name>")?
      - name: Queue Message Operations
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Send messages via queue_client.send_message(message.try_into()?, None).await?.
          Receive messages via queue_client.receive_messages(None).await? returning a response
          that converts to model with items containing message_id, pop_receipt, and message_text fields.
          Delete messages via queue_client.delete_message(id, pop_receipt, None).await?.
          Peek via queue_client.peek_messages(None).await?.
      - name: Async Runtime
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Code uses #[tokio::main] and async/await. Queue operations are properly awaited.
          Result<T, Box<dyn std::error::Error>> main signature for error propagation.
      - name: Error Handling
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Queue operations are wrapped in Result-based error handling using ? operator.
          No .unwrap() calls except where failure is impossible.
          Main function returns Result for proper error propagation.
