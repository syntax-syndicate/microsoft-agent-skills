name: azure-keyvault-secrets-rust-eval
description: Evaluation suite for azure-security-keyvault-secrets-rust
version: "1.0"
type: capability
scoring:
  weights: {}
  threshold: 1.0
defaults:
  runs: 1
  timeout: 30m
  model: claude-sonnet-4.6
stimuli:
  - name: rust-keyvault-secrets-operations
    prompt: |
      Write a Rust program named rust-keyvault-secrets that demonstrates secure secret
      management with Azure Key Vault:

      Setup:
      1. Create a SecretClient with vault URL and TokenCredential
      2. Use DeveloperToolsCredential for local dev

      CRUD operations:
      1. Set a secret with SetSecretParameters including value and content_type
      2. Get a secret with get_secret()
      3. Update secret properties with UpdateSecretPropertiesParameters
      4. Delete a secret with delete_secret()
      5. List secrets with list_secret_properties() returning Pager<T>

      Advanced operations:
      1. Extract resource ID components (name, version) using ResourceExt trait
      2. Set content_type on secrets (e.g., "text/plain")
      3. Add tags to secrets using HashMap
      4. Handle pagination when listing secrets with try_next() from TryStreamExt

      Error handling:
      1. Match on Ok/Err for secret operations
      2. Extract ErrorResponse from errors
      3. Handle 404 errors for missing secrets gracefully

      Demonstrate:
      - SecretClient::new() with vault URL and credential
      - SetSecretParameters and try_into() for request conversion
      - UpdateSecretPropertiesParameters with content_type and tags
      - Pager<T> iteration with TryStreamExt::try_next()
      - ResourceExt trait for extracting name and version
      - Proper async/await with Tokio runtime
      - Result-based error propagation

      The program should compile and execute successfully, demonstrating complete
      secret lifecycle management with proper credential-based authentication.

    rubric:
      - "Uses official azure_security_keyvault_secrets SDK."
      - "Creates SecretClient with vault URL and TokenCredential."
      - "Sets secrets with SetSecretParameters including value and content_type."
      - "Retrieves secrets with get_secret() and converts with into_model()."
      - "Updates secret properties with tags and content_type."
      - "Deletes secrets with delete_secret()."
      - "Lists secrets returning Pager<T> with pagination support."
      - "Uses ResourceExt trait to extract name and version fields."
      - "Iterates paginated results with TryStreamExt::try_next()."
      - "Handles errors with match patterns and ErrorResponse extraction."
      - "Uses TokenCredential for secure authentication."
      - "Async/await with Tokio and proper error handling."
      - "Code compiles without warnings."
    workspace_files:
      include:
        - "**/Cargo.toml"
        - "**/Cargo.lock"
        - "**/src/**/*.rs"
      exclude:
        - "**/target/**"
        - "**/*.rlib"
        - "**/*.rmeta"
    environment:
      files:
        - src: workspace/cargo.toml
          dest: Cargo.toml
    constraints:
      expect_skills:
        - azure-keyvault-secrets-rust
    graders:
      - type: prompt
        name: "Key Vault secrets completeness"
        config:
          model: gpt-5.3-codex
          prompt: |
            - SecretClient creation with vault URL and credential
            - Set secret with SetSecretParameters including value
            - Get secret with into_model() conversion
            - Update secret properties with tags and content_type
            - Delete secret operation
            - List secrets returning Pager<T>
            - Pagination with TryStreamExt::try_next()
            - ResourceExt for name/version extraction
            - Error matching and ErrorResponse handling
            - TokenCredential authentication
            - Async/await throughout
          scoring: scale_1_5

      - type: run-command
        name: "Cargo Check"
        config:
          command: cargo
          args:
            - "check"
          timeout: 90s
      - name: Rust Clippy Lints
        type: run-command
        weight: 1.0
        config:
          command: cargo
          args:
            - "clippy"
            - "--"
            - "-D"
            - "warnings"
          timeout: 120s
      - type: run-command
        name: "Cargo Build"
        config:
          command: cargo
          args:
            - "build"
          timeout: 120s

      - name: SecretClient Creation
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          SecretClient created via SecretClient::new(vault_url, credential, None)
          Vault URL is vault_name.vault.azure.net in https protocol
          Credential is TokenCredential (DeveloperToolsCredential or ManagedIdentityCredential)
      - name: Secret CRUD Operations
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Set: client.set_secret(name, params.try_into()?, None).await?
          Get: client.get_secret(name, None).await?.into_model()?
          Update: client.update_secret_properties(name, params.try_into()?, None).await?
          Delete: client.delete_secret(name, None).await?
      - name: SetSecretParameters Pattern
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          SetSecretParameters created with value: Some(value.into())
          Content type can be set via content_type: Some("text/plain".into())
          Uses #[allow(clippy::needless_update)] with ..Default::default()
      - name: Listing with Pagination
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          List secrets returns Pager<T> via client.list_secret_properties(None)?
          Iterate with let mut pager = ...; while let Some(secret) = pager.try_next().await?
          Uses futures::TryStreamExt trait for try_next()
          Extract name/version via secret.resource_id()?.name
      - name: Resource Extraction
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Use ResourceExt trait via secret.resource_id()?
          Returns ResourceId with name and version fields
          Stored for audit or reconstruction purposes
      - name: Async Runtime and Error Handling
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Uses #[tokio::main] on main function
          All I/O operations awaited
          No .unwrap() on fallible operations
          Result<T, E> propagated with ? operator
          Error extraction with into_inner()? on error types
