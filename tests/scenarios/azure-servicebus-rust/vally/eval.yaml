name: azure-servicebus-rust-eval
description: Evaluation suite for azure-messaging-servicebus-rust
version: "1.0"
type: capability
scoring:
  weights: {}
  threshold: 0.75
defaults:
  runs: 1
  timeout: 30m
  model: claude-sonnet-4.6
stimuli:
  - name: rust-servicebus-messaging
    prompt: |
      Write a Rust program named rust-servicebus-ops that demonstrates Azure Service Bus
      messaging patterns including queues, topics, and subscriptions:

      Queue operations:
      1. Create a ServiceBusClient with namespace credentials
      2. Create a sender for a queue named "orders"
      3. Send messages to the queue via sender.send_message()
      4. Create a receiver for the queue
      5. Receive messages (up to 5) via receiver.receive_messages()
      6. Complete messages after processing via receiver.complete_message()
      7. Handle cases where messages must be abandoned for retry

      Topic and subscription operations:
      1. Create a sender for a topic named "notifications"
      2. Send messages to the topic
      3. Create a receiver for a subscription "alerts" on the topic
      4. Receive messages from the subscription
      5. Complete messages after processing

      Demonstrate:
      - ServiceBusClient::builder().open(namespace, credential).await pattern
      - Message creation via Message::from()
      - Sender/receiver creation for both queues and topics
      - Message body access via body_as_string()
      - Message settlement: complete_message() for success, abandon for retry
      - TokenCredential authentication (DeveloperToolsCredential/ManagedIdentityCredential)
      - Async/await with Tokio runtime
      - Proper Result-based error propagation

      The program should compile and run successfully with proper async message handling,
      demonstrating the complete Service Bus workflow for enterprise messaging.

    rubric:
      - "Uses official azure_messaging_servicebus SDK with proper client creation."
      - "Implements ServiceBusClient with TokenCredential-based authentication."
      - "Creates senders and receivers for both queues and topics."
      - "Sends messages to queues and topics via sender.send_message()."
      - "Receives messages with receiver.receive_messages(count, options)."
      - "Completes messages after processing with receiver.complete_message()."
      - "Handles message bodies with body_as_string() or equivalent extraction."
      - "Demonstrates both queue (point-to-point) and topic (pub-sub) patterns."
      - "Async/await with Tokio runtime and proper error handling."
      - "Code compiles without warnings and follows Rust idioms."
    workspace_files:
      include:
        - "**/Cargo.toml"
        - "**/Cargo.lock"
        - "**/src/**/*.rs"
      exclude:
        - "**/target/**"
        - "**/*.rlib"
        - "**/*.rmeta"
    environment:
      skills:
        - ../../../../.github/plugins/azure-sdk-rust/skills/azure-servicebus-rust
      files:
        - src: workspace/cargo.toml
          dest: Cargo.toml
    constraints:
      expect_skills:
        - azure-servicebus-rust
    graders:
      - type: prompt
        name: "Service Bus messaging completeness"
        config:
          model: gpt-5.3-codex
          prompt: |
            - ServiceBusClient initialization with builder and open()
            - Queue sender/receiver creation
            - Topic sender and subscription receiver creation
            - Message sending via send_message(message, None).await
            - Message receiving via receive_messages(count, None).await
            - Message body extraction via body_as_string()
            - Message settlement with complete_message()
            - Abandon message pattern for retries
            - TokenCredential authentication pattern
            - Async/await with Tokio #[tokio::main]
          scoring: scale_1_5
      - name: Official Azure SDK Crate Selection
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-azure-crates.rs"
      - name: TokenCredential Authentication
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-token-credential.rs"
      - name: Async-First with Tokio Runtime
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-async-runtime.rs"
      - name: No Hardcoded Secrets
        type: program
        weight: 1.0
        config:
          program: cargo
          args:
            - "+nightly"
            - "-Zscript"
            - ".vally/tools/check-no-secrets.rs"

      - type: run-command
        name: "Cargo Check"
        config:
          command: cargo
          args:
            - "check"
          timeout: 90s
      - name: Rust Clippy Lints
        type: run-command
        weight: 1.0
        config:
          command: cargo
          args:
            - "clippy"
            - "--"
            - "-D"
            - "warnings"
          timeout: 120s
      - type: run-command
        name: "Cargo Build"
        config:
          command: cargo
          args:
            - "build"
          timeout: 120s

      - name: ServiceBusClient Builder Pattern
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          ServiceBusClient created via ServiceBusClient::builder()
          .open(namespace, credential).await?
          Sender created via client.create_sender(queue_or_topic_name, None).await?
          Receiver created via client.create_receiver(queue_name, None).await?
          Topic subscription receiver via create_receiver_for_subscription(topic, subscription, None).await?
      - name: Message Operations
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Messages created via Message::from(text) or Message::from(bytes)
          Send via sender.send_message(message, None).await?
          Receive via receiver.receive_messages(count, None).await? returning Vec<Message>
          Extract body via message.body_as_string()? or equivalent
      - name: Message Settlement
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          After processing, call receiver.complete_message(&message, None).await?
          For retriable errors, use receiver.abandon_message(&message, None).await?
          No message is processed without explicit settlement
          Proper Result-based error handling for settlement operations
      - name: Queue and Topic Patterns
        type: prompt
        weight: 1.0
        model: gpt-5.3-codex
        prompt: >
          Queues demonstrated via create_sender/create_receiver on queue names
          Topics demonstrated via create_sender on topic names
          Subscriptions accessed via create_receiver_for_subscription(topic_name, subscription_name, None).await?
          Both patterns use same Message type and settlement semantics
